<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charbel Antoun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --black: #000;
  --white: #fff;
  --dim: rgba(255,255,255,0.45);
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'Space Grotesk', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  line-height: 1.5;
  cursor: none;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

a, button { cursor: none; color: inherit; text-decoration: none; }
ul { list-style: none; }

.cursor {
  position: fixed;
  top: 0; left: 0;
  width: 10px; height: 10px;
  background: var(--white);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition:
    width  .22s cubic-bezier(.25,.46,.45,.94),
    height .22s cubic-bezier(.25,.46,.45,.94),
    background .22s ease,
    border .22s ease;
  mix-blend-mode: difference;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.cursor-follower {
  position: fixed;
  top: 0; left: 0;
  width: 30px; height: 30px;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition:
    width  .38s cubic-bezier(.25,.46,.45,.94),
    height .38s cubic-bezier(.25,.46,.45,.94),
    border-color .22s ease;
}

body.cursor--hover .cursor {
  width: 40px; height: 40px;
  background: transparent;
  border: 1.5px solid var(--white);
}
body.cursor--hover .cursor-follower {
  width: 56px; height: 56px;
  border-color: rgba(255,255,255,.5);
}

body.cursor--play .cursor {
  width: 54px; height: 54px;
  background: var(--white);
  border: none;
}
body.cursor--play .cursor::after {
  content: 'PLAY';
  font-family: var(--font-body);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: .1em;
  color: var(--black);
}
body.cursor--play .cursor-follower {
  width: 70px; height: 70px;
}

.intro {
  position: fixed;
  inset: 0;
  z-index: 9000;
  background: var(--black);
  display: flex;
  align-items: center;
  padding-left: 8vw;
  pointer-events: none;
}

.intro-name {
  display: flex;
  align-items: baseline;
  gap: .18em;
  font-family: var(--font-display);
  font-size: clamp(4rem, 12vw, 13rem);
  line-height: 1;
  letter-spacing: .04em;
}

.intro-word { display: inline-flex; }

.intro-word span,
.intro-space {
  display: inline-block;
  opacity: 0;
  transform: translateY(.2em);
}

.intro-name.animate .intro-word span,
.intro-name.animate .intro-space {
  animation: letterIn .55s cubic-bezier(.16,1,.3,1) forwards;
}

@keyframes letterIn {
  to { opacity: 1; transform: translateY(0); }
}

.intro.fade-out {
  animation: introOut .65s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes introOut {
  to { opacity: 0; }
}

.site--hidden { opacity: 0; }

[data-reveal] {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity .7s ease, transform .7s cubic-bezier(.16,1,.3,1);
}
[data-reveal].revealed {
  opacity: 1;
  transform: translateY(0);
}

#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  filter: blur(8px);
  transform: scale(1.18);
  pointer-events: none;
  will-change: opacity;
}

@media (hover: none) {
  #bg-video { display: none; }
}

[data-scroll-slide] {
  opacity: 0;
  transform: translateX(-48px);
  transition: opacity 0.32s ease, transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
}
[data-scroll-slide].in-view {
  opacity: 1;
  transform: translateX(0);
}

[data-scroll-fade] {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
[data-scroll-fade].in-view {
  opacity: 1;
  transform: translateY(0);
}

.work__grid .video-card {
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 0.38s ease, transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
}
.work__grid .video-card.card-in {
  opacity: 1;
  transform: scale(1);
}

.video-card--portrait .video-frame {
  aspect-ratio: 9 / 16;
}

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2rem 8vw;
  mix-blend-mode: difference;
}

.nav__logo {
  font-family: var(--font-display);
  font-size: 1.25rem;
  letter-spacing: .14em;
}

.nav__links { display: flex; gap: 2.8rem; }

.nav__link {
  font-size: .75rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  position: relative;
  padding-bottom: 2px;
}
.nav__link::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 1px;
  background: var(--white);
  transition: width .3s ease;
}
.nav__link:hover::after { width: 100%; }

.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  align-items: center;
  padding: 14vh 8vw 10vh;
  gap: 5vw;
}

.hero__name {
  font-family: var(--font-display);
  font-size: clamp(4rem, 9vw, 10.5rem);
  line-height: .92;
  letter-spacing: .02em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.hero__subtitle {
  font-size: .75rem;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 1.4rem;
}

.hero__descriptor {
  font-size: clamp(1rem, 1.6vw, 1.35rem);
  font-weight: 300;
  line-height: 1.45;
  max-width: 320px;
}

.hero__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  align-items: start;
}

.hero__grid .video-card:nth-child(even) {
  margin-top: 2.5rem;
}

.video-card {
  position: relative;
}

.video-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #111;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.12);
}

.video-frame img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video-frame.thumb-error {
  background: repeating-linear-gradient(
    45deg,
    #0d0d0d 0px, #0d0d0d 10px,
    #111 10px, #111 20px
  );
}

.video-frame video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity .3s ease;
}

.video-frame.is-playing video { opacity: 1; }
.video-frame.is-playing img   { opacity: 0; }

.cat-tag {
  position: absolute;
  top: .6rem; right: .6rem;
  font-size: .6rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: .2rem .45rem;
  border: 1px solid rgba(255,255,255,.4);
  color: rgba(255,255,255,.7);
  z-index: 2;
  pointer-events: none;
}

.video-info { padding: .55rem 0 0; }
.video-title {
  font-size: .8rem;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sound-hint {
  position: absolute;
  bottom: .6rem; left: .65rem;
  font-size: .6rem;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,.7);
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s ease;
  display: flex;
  align-items: center;
  gap: .3em;
}
.sound-hint::before {
  content: '♪';
  font-size: .75rem;
}

@keyframes hintPulse {
  0%, 100% { opacity: .55; }
  50%       { opacity: 1;   }
}

.video-frame.is-playing .sound-hint {
  opacity: 1;
  animation: hintPulse 2s ease-in-out infinite;
}

.video-frame.is-playing.has-sound .sound-hint {
  opacity: 0;
  animation: none;
}

.work {
  padding: 10vh 8vw;
  border-top: 1px solid rgba(255,255,255,.1);
}

.work__header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 4rem;
  flex-wrap: wrap;
  gap: 2rem;
}

.section-label {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 5vw, 5rem);
  letter-spacing: .04em;
  line-height: 1;
}

.work__filters {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
  padding-bottom: .2rem;
}

.filter-tab {
  background: none;
  border: none;
  font-family: var(--font-body);
  font-size: .75rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--dim);
  padding-bottom: 3px;
  border-bottom: 1px solid transparent;
  transition: color .2s ease, border-color .2s ease;
}
.filter-tab:hover { color: var(--white); }
.filter-tab.is-active {
  color: var(--white);
  border-bottom-color: var(--white);
}

.work__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2rem 1.5rem;
}

.video-card.is-hidden { display: none; }

.contact {
  padding: 12vh 8vw;
  border-top: 1px solid rgba(255,255,255,.1);
}

.contact__heading {
  font-family: var(--font-display);
  font-size: clamp(4rem, 10vw, 11rem);
  line-height: .9;
  letter-spacing: .02em;
  margin-bottom: 4rem;
}

.contact__links {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.contact__link {
  font-size: clamp(1rem, 2vw, 1.6rem);
  font-weight: 300;
  letter-spacing: .08em;
  border-bottom: 1px solid rgba(255,255,255,.2);
  padding-bottom: .4rem;
  display: inline-block;
  transition: border-color .25s ease;
}
.contact__link:hover { border-color: var(--white); }

.contact__link--icon {
  border-bottom: none;
  padding-bottom: 0;
  opacity: .6;
  transition: opacity .25s ease;
  display: inline-flex;
  align-items: center;
}
.contact__link--icon:hover { opacity: 1; }

.modal {
  position: fixed;
  inset: 0;
  z-index: 8000;
  background: rgba(0,0,0,.96);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease;
}
.modal.is-open {
  opacity: 1;
  pointer-events: all;
}

.modal__close {
  position: absolute;
  top: 2rem; right: 2.5rem;
  background: none;
  border: none;
  color: var(--white);
  font-size: 1.5rem;
  line-height: 1;
  padding: .5rem;
  opacity: .6;
  transition: opacity .2s ease;
}
.modal__close:hover { opacity: 1; }

.modal__inner {
  width: min(88vw, 1100px);
}

.modal__video {
  width: 100%;
  display: block;
  border: 1px solid rgba(255,255,255,.15);
  background: #000;
}

.modal__title {
  font-size: .75rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: .9rem;
}
  </style>
</head>
<body>

  <!-- BACKGROUND AMBIENCE VIDEO -->
  <video id="bg-video" muted loop playsinline preload="none" aria-hidden="true"></video>

  <!-- CUSTOM CURSOR -->
  <div id="cursor" class="cursor"></div>
  <div id="cursor-follower" class="cursor-follower"></div>

  <!-- FULLSCREEN VIDEO MODAL -->
  <div id="video-modal" class="modal" aria-hidden="true">
    <button id="modal-close" class="modal__close" aria-label="Close">&#x2715;</button>
    <div class="modal__inner">
      <video id="modal-video" class="modal__video" controls></video>
      <p id="modal-title" class="modal__title"></p>
    </div>
  </div>

  <!-- INTRO OVERLAY -->
  <div id="intro" class="intro">
    <div id="intro-name" class="intro-name">
      <span class="intro-word">
        <span>C</span><span>H</span><span>A</span><span>R</span><span>B</span><span>E</span><span>L</span>
      </span>
      <span class="intro-space">&nbsp;</span>
      <span class="intro-word">
        <span>A</span><span>N</span><span>T</span><span>O</span><span>U</span><span>N</span>
      </span>
    </div>
  </div>

  <!-- MAIN SITE -->
  <div id="site" class="site site--hidden">

    <!-- NAV -->
    <nav class="nav" data-reveal>
      <div class="nav__logo">CA</div>
      <ul class="nav__links">
        <li><a href="#work"    class="nav__link">Work</a></li>
        <li><a href="#contact" class="nav__link">Contact</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero__left" data-reveal>
        <h1 class="hero__name">Charbel<br>Antoun</h1>
        <p class="hero__subtitle">Video Editor · Short Form · Motion Graphics</p>
      </div>
      <!-- Hero video grid — first 4 videos injected by JS -->
      <div class="hero__grid" id="hero-grid" data-reveal></div>
    </section>

    <!-- WORK -->
    <section class="work" id="work">
      <div class="work__header">
        <span class="section-label" data-scroll-slide>Work</span>
        <div class="work__filters" id="work-filters" data-scroll-fade>
          <button class="filter-tab is-active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="Short Form">Short Form</button>
          <button class="filter-tab" data-filter="Motion Graphics">Motion Graphics</button>
          <button class="filter-tab" data-filter="Editing">Editing</button>
          <button class="filter-tab" data-filter="Music Videos">Music Videos</button>
        </div>
      </div>
      <div class="work__grid" id="work-grid"></div>
    </section>

    <!-- CONTACT -->
    <section class="contact" id="contact">
      <div class="contact__inner">
        <h2 class="contact__heading" data-scroll-slide>Let's work.</h2>
        <div class="contact__links" data-scroll-fade>
          <a href="mailto:shbvvell@gmail.com" class="contact__link">shbvvell@gmail.com</a>
          <a href="https://www.instagram.com/sai3in/" target="_blank" class="contact__link contact__link--icon" aria-label="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
          </a>
        </div>
      </div>
    </section>

  </div><!-- /site -->

  <script src="script.js"></script>
</body>
</html>
